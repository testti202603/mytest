<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景图+视频容器</title>
    <style>
        /* 页面背景图样式（沿用你之前的需求，这里用方案2保证上下铺满） */
        body {
            margin: 0;
            padding: 0;
            background-image: url("img/jieshao.jpg"); /* 替换为实际背景图路径 */
            background-repeat: no-repeat;
            background-size: auto 100vh; /* 上下铺满背景图 */
            background-position: center center;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            /* 让视频容器居中显示的基础样式 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 视频容器样式（可自定义宽高、边框、阴影等） */
        .video-container {
            width: 600px; /* 视频容器宽度，可改为固定值如800px */
            /* max-width: 800px;  */
            height: 300px; /* 高度，可改为固定值如600px */
            background-color: rgba(0, 0, 0, 0.3); /* 半透明背景，提升视频可读性 */
            border-radius: 8px; /* 圆角 */
            overflow: hidden; /* 防止视频超出容器 */
            /* 可选：添加阴影 */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            margin-top: -100px; 
        }

        /* 适配HTML5视频的样式（让视频铺满容器） */
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 视频铺满容器，保持比例 */
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video controls autoplay muted loop>
            <source src="img/1.mp4" type="video/mp4">
            你的浏览器不支持HTML5视频播放，请升级浏览器。
        </video>
    </div>
</body>
</html>
