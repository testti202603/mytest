                });
                
                if (q.img) {
                    html += `</div>`;
                }
                
                questionDiv.innerHTML = html;
                container.appendChild(questionDiv);
            });
            
            document.querySelector('.question-container[data-question-id="1"]').classList.add('active');
        }

        function initAnswerStorage() {
            for (let i = 1; i <= totalQuestions; i++) {
                userAnswers[i] = {};
                const question = questionsData.find(q => q.id === i);
                if (question) {
                    question.subQuestions.forEach(sub => {
                        userAnswers[i][sub.id] = '';
                    });
                }
            }
        }

        function bindOptionClicks() {
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('option-btn')) {
                    const qId = parseInt(e.target.getAttribute('data-question-id'));
                    const subId = e.target.getAttribute('data-sub-id');
                    
                    const sameSubOptions = document.querySelectorAll(`.option-btn[data-question-id="${qId}"][data-sub-id="${subId}"]`);
                    sameSubOptions.forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    
                    e.target.classList.add('selected');
                    userAnswers[qId][subId] = e.target.textContent;
                    document.getElementById('error-msg').style.display = 'none';
                    
                    updateDependentQuestions(qId);
                }
            });

            document.addEventListener('input', function(e) {
                if (e.target.classList.contains('text-input')) {
                    const qId = parseInt(e.target.getAttribute('data-question-id'));
                    const subId = e.target.getAttribute('data-sub-id');
                    userAnswers[qId][subId] = e.target.value;
                    document.getElementById('error-msg').style.display = 'none';
                    
                    updateDependentQuestions(qId);
                }
            });
        }

        function updateDependentQuestions(qId) {
            const dependentQuestions = questionsData.filter(q => q.dependsOn === qId);
            dependentQuestions.forEach(q => {
                const questionDiv = document.querySelector(`.question-container[data-question-id="${q.id}"]`);
                if (questionDiv) {
                    const optionsContainer = questionDiv.querySelector('.options');
                    if (optionsContainer) {
                        const answer = userAnswers[qId][1];
                        if (answer) {
                            updateQuestionOptions(q.id, answer);
                        }
                    }
                }
            });
        }

        function updateQuestionOptions(qId, previousAnswer) {
            const question = questionsData.find(q => q.id === qId);
            if (!question) return;
            
            let newOptions = [];
            switch(qId) {
                case 10:
                    if (previousAnswer.includes('One')) {
                        newOptions = ['A', 'B', 'C', 'D', 'E'];
                    } else if (previousAnswer.includes('Two or three')) {
                        newOptions = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
                    } else if (previousAnswer.includes('herd')) {
                        newOptions = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
                    }
                    break;
                default:
                    newOptions = question.subQuestions[0].options;
            }
            
            if (newOptions.length > 0) {
                const optionsContainer = document.querySelector(`.question-container[data-question-id="${qId}"] .options`);
                if (optionsContainer) {
                    optionsContainer.innerHTML = '';
                    newOptions.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        btn.setAttribute('data-question-id', qId);
                        btn.setAttribute('data-sub-id', 1);
                        const optionText = typeof opt === 'object' ? opt.text : opt;
                        btn.textContent = optionText;
                        optionsContainer.appendChild(btn);
                    });
                    
                    question.subQuestions[0].options = newOptions;
                }
            }
        }

        function bindNavButtons() {
            document.getElementById('next-btn').addEventListener('click', function() {
                if (!checkAllSubQuestionsAnswered(currentQuestion)) {
                    document.getElementById('error-msg').style.display = 'block';
                    return;
                }
                document.getElementById('error-msg').style.display = 'none';
                goToNextQuestion();
            });

            document.getElementById('prev-btn').addEventListener('click', goToPrevQuestion);

            document.getElementById('submit-btn').addEventListener('click', function() {
                if (!checkAllQuestionsAnswered()) {
                    document.getElementById('error-msg').textContent = 'Please complete all questions before submitting!';
                    document.getElementById('error-msg').style.display = 'block';
                    return;
                }
                document.getElementById('error-msg').style.display = 'none';
                showResult();
            });

            document.getElementById('back-btn').addEventListener('click', resetQuiz);
        }

        function checkAllSubQuestionsAnswered(qId) {
            const subAnswers = userAnswers[qId];
            for (const subId in subAnswers) {
                if (!subAnswers[subId] || subAnswers[subId].trim() === '') {
                    return false;
                }
            }
            return true;
        }

        function checkAllQuestionsAnswered() {
            for (let i = 1; i <= totalQuestions; i++) {
                if (!checkAllSubQuestionsAnswered(i)) {
                    return false;
                }
            }
            return true;
        }

        function goToNextQuestion() {
            document.querySelector(`.question-container[data-question-id="${currentQuestion}"]`).classList.remove('active');
            currentQuestion++;
            document.querySelector(`.question-container[data-question-id="${currentQuestion}"]`).classList.add('active');
            restoreSelectedAnswers(currentQuestion);
            updateProgressText();
            updateNavButtonStatus();
        }

        function goToPrevQuestion() {
            document.querySelector(`.question-container[data-question-id="${currentQuestion}"]`).classList.remove('active');
            currentQuestion--;
            document.querySelector(`.question-container[data-question-id="${currentQuestion}"]`).classList.add('active');
            restoreSelectedAnswers(currentQuestion);
            updateProgressText();
            updateNavButtonStatus();
        }

        function restoreSelectedAnswers(qId) {
            const subAnswers = userAnswers[qId];
            for (const subId in subAnswers) {
                const answerText = subAnswers[subId];
                if (!answerText) continue;
                
                const targetBtn = Array.from(document.querySelectorAll(`.option-btn[data-question-id="${qId}"][data-sub-id="${subId}"]`)).find(btn => {
                    return btn.textContent === answerText;
                });
                if (targetBtn) {
                    targetBtn.classList.add('selected');
                }
                
                const targetInput = document.querySelector(`.text-input[data-question-id="${qId}"][data-sub-id="${subId}"]`);
                if (targetInput) {
                    targetInput.value = answerText;
                }
            }
        }

        function updateProgressText() {
            document.querySelector('.progress').textContent = `Question ${currentQuestion}/${totalQuestions}`;
        }

        function updateNavButtonStatus() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');

            prevBtn.disabled = currentQuestion === 1;

            if (currentQuestion === totalQuestions) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
            }
        }

        function showResult() {
            document.getElementById('quiz-page').style.display = 'none';
            document.getElementById('result-page').style.display = 'block';

            const resultList = document.getElementById('result-list');
            resultList.innerHTML = '';

            let finalAnswerText = '';

            questionsData.forEach((q, index) => {
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                
                let html = `<div class="result-question-title">${q.id}. ${q.question}</div>`;
                if (q.img) {
                    html += `<img src="${q.img}" alt="Question ${q.id} image" class="result-img">`;
                }
                
                let answerText = '<div class="answer-info"><strong>Your answer:</strong><br>';
                q.subQuestions.forEach((sub, subIndex) => {
                    const answer = userAnswers[q.id][sub.id];
                    answerText += `${answer}<br>`;
                    finalAnswerText += `${answer},`;
                    
                    const selectedOption = sub.options.find(opt => {
                        const optionText = typeof opt === 'object' ? opt.text : opt;
                        return optionText === answer;
                    });
                    
                    if (selectedOption && typeof selectedOption === 'object' && selectedOption.meaning) {
                        answerText += `<div style="margin-top: 10px; padding: 10px; background-color: #e8f5e9; border-radius: 5px; border-left: 4px solid #4caf50;"><strong>Psychological explanation:</strong>${selectedOption.meaning}</div>`;
                    }
                });
                answerText += '</div>';
                
                html += answerText;
                
                if (index < answerImages.length) {
                    html += `<div style="margin-top: 20px; padding: 15px; background-color: #fff3e0; border-radius: 5px; border-left: 4px solid #ff9800;">`;
                    html += `<strong>Reference answer:</strong><br>`;
                    html += `<img src="${answerImages[index]}" alt="Answer to Question ${q.id}" class="result-img" style="margin-top: 10px;">`;
                    html += `</div>`;
                }
                
                resultItem.innerHTML = html;
                resultList.appendChild(resultItem);
            });

            finalAnswerText = finalAnswerText.slice(0, -1);
            document.getElementById('final-answer').style.display = 'block';
            document.getElementById('final-answer-content').textContent = finalAnswerText;
        }

        function resetQuiz() {
            currentQuestion = 1;
            userAnswers = {};
            initAnswerStorage();
            
            document.getElementById('quiz-page').style.display = 'block';
            document.getElementById('result-page').style.display = 'none';
            document.getElementById('final-answer').style.display = 'none';

            document.querySelectorAll('.question-container').forEach(container => {
                container.classList.remove('active');
                container.querySelectorAll('.option-btn').forEach(btn => {
                    btn.classList.remove('selected');
                });
                container.querySelectorAll('.text-input').forEach(input => {
                    input.value = '';
                });
            });
            document.querySelector('.question-container[data-question-id="1"]').classList.add('active');

            updateProgressText();
            updateNavButtonStatus();
            document.getElementById('next-btn').style.display = 'inline-block';
            document.getElementById('submit-btn').style.display = 'none';
        }
    </script>
</body>
</html>
